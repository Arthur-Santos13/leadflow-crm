services:
  # ── Banco de dados ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: leadflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadflow_pass}
      POSTGRES_DB: ${POSTGRES_DB:-leadflow_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-leadflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (opcional — acesso via http://localhost:5050) ────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: leadflow_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@leadflow.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    profiles:
      - tools

  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: leadflow_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-leadflow}:${POSTGRES_PASSWORD:-leadflow_pass}@postgres:5432/${POSTGRES_DB:-leadflow_dev}
      DATABASE_URL_UNPOOLED: postgresql://${POSTGRES_USER:-leadflow}:${POSTGRES_PASSWORD:-leadflow_pass}@postgres:5432/${POSTGRES_DB:-leadflow_dev}
    ports:
      - '${BACKEND_PORT:-3333}:3333'

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: leadflow_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-80}:80'

volumes:
  postgres_data:
